    <style>
        body {

        #toast-container {

        .toast {

            transform: translateY(-4px);

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);

            padding: 0.5rem 1rem;
            border-radius: 0.5rem;

        .btn-secondary {

        input,

        input:focus,

            outline: none;
            border-color: #0ea5e9;

        /* Mobile Sidebar */
        .mobile-sidebar {
            position: fixed;

            width: 280px;

        .sidebar-overlay {
            position: fixed;

            left: 0;
            right: 0;

            z-index: 1001;

        }

    <script>
        // KONFIGURASI - GANTI DENGAN URL WEB APP ANDA
        const GOOGLE_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzqG9cQMjnpv-bOyifs4kfdpPYdEB5A5a7lw64Yod7GtfFKN4kcwN3BhYyeTQ90n4p7/exec';

        // State management
        let db = {
            contentPlanner: [],
            brsSchedule: [],
            protocol: [],
            team: []
        };
        let currentState = 'dashboard';
        let isLoading = false;
        let currentEditItem = null;
        let currentModalType = null;
        let chartInstance = null;

        // Fungsi khusus untuk mengirim data ke Google Apps Script
        async function sendDataToServer(action, sheetName, item) {
            try {
                const payload = {
                    action: action,
                    sheet: sheetName,
                    item: item
                };

                const response = await fetch(GOOGLE_SHEETS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (!result.success) throw new Error('Gagal sync ke server');

                // Jika sukses sinkron, panggil fetch ulang data agar web update
                await fetchDataFromSheets();

            } catch (error) {
                console.error('Sync Error:', error);
                showToast('Gagal menyimpan ke Spreadsheet (Cek Console)', 'error');
            }
        }

        // Mobile sidebar functions
        function openMobileSidebar() {
            document.getElementById('mobile-sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileSidebar() {
            document.getElementById('mobile-sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Helper functions
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-500 text-lg"></i>' :
                type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500 text-lg"></i>' :
                    '<i class="fa-solid fa-circle-info text-blue-500 text-lg"></i>';
            toast.innerHTML = `${icon} <span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                return new Date(dateString).toLocaleDateString('id-ID', options);
            } catch (e) {
                return dateString;
            }
        }

        function formatDateInput(dateString) {
            if (!dateString) return '';
            try {
                return new Date(dateString).toISOString().split('T')[0];
            } catch (e) {
                return '';
            }
        }

        // Fetch data dari Google Sheets
        async function fetchDataFromSheets() {
            if (isLoading) return;
            isLoading = true;

            try {
                const response = await fetch(GOOGLE_SHEETS_API_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');

                const data = await response.json();

                db.contentPlanner = data.contentPlanner || [];
                db.brsSchedule = data.brsSchedule || [];
                db.protocol = data.protocol || [];
                db.team = data.team || [];

                const now = new Date();
                const dateStr = now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('last-sync-date').textContent = dateStr;
                const mobileSync = document.getElementById('mobile-last-sync-date');
                if (mobileSync) mobileSync.textContent = dateStr;

                showToast('Data berhasil disinkronkan dari Google Sheets!');
                router(currentState);

            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('Gagal sinkron data: ' + error.message, 'error');
                useDefaultData();
            } finally {
                isLoading = false;
            }
        }

        // CRUD Operations
        function openModal(type, item = null) {
            currentModalType = type;
            currentEditItem = item;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'dynamic-modal';

            let title = '';
            let fields = '';

            if (type === 'content') {
                title = item ? 'Edit Konten' : 'Tambah Konten Baru';
                fields = `
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium mb-1">Judul</label><input type="text" id="judul" value="${item?.judul || ''}" class="w-full" required></div>
                        <div><label class="block text-sm font-medium mb-1">Konsep</label><input type="text" id="konsep" value="${item?.konsep || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Jenis</label>
                            <select id="jenis" class="w-full"><option ${item?.jenis === 'Hard Selling' ? 'selected' : ''}>Hard Selling</option><option ${item?.jenis === 'Soft Selling' ? 'selected' : ''}>Soft Selling</option><option ${item?.jenis === 'Trend' ? 'selected' : ''}>Trend</option></select>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Post Type</label>
                            <select id="postType" class="w-full"><option ${item?.postType === 'Carousel' ? 'selected' : ''}>Carousel</option><option ${item?.postType === 'Reels' ? 'selected' : ''}>Reels</option><option ${item?.postType === 'Single Image' ? 'selected' : ''}>Single Image</option><option ${item?.postType === 'Video' ? 'selected' : ''}>Video</option></select>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Progres (%)</label><input type="number" id="progres" value="${item?.progres || 0}" min="0" max="100" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Jadwal</label><input type="date" id="jadwal" value="${formatDateInput(item?.jadwal)}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Status</label>
                            <select id="status" class="w-full"><option ${item?.status === 'Draft' ? 'selected' : ''}>Draft</option><option ${item?.status === 'In Progress' ? 'selected' : ''}>In Progress</option><option ${item?.status === 'Posted' ? 'selected' : ''}>Posted</option><option ${item?.status === 'Done' ? 'selected' : ''}>Done</option></select>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Ditugaskan ke</label>
                            <select id="assignedTo" class="w-full">${db.team.map(m => `<option ${item?.assignedTo === m.nama ? 'selected' : ''}>${m.nama}</option>`).join('')}</select>
                        </div>
                    </div>
                `;
            } else if (type === 'schedule') {
                title = item ? 'Edit Jadwal Rilis' : 'Tambah Jadwal Rilis';
                fields = `
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium mb-1">Judul</label><input type="text" id="judul" value="${item?.judul || ''}" class="w-full" required></div>
                        <div><label class="block text-sm font-medium mb-1">Tanggal</label><input type="date" id="tanggal" value="${formatDateInput(item?.tanggal)}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">PIC Poster</label><input type="text" id="pic_poster" value="${item?.pic_poster || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">PIC Info</label><input type="text" id="pic_info" value="${item?.pic_info || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">PIC Doc</label><input type="text" id="pic_doc" value="${item?.pic_doc || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">PIC Highlight</label><input type="text" id="pic_high" value="${item?.pic_high || ''}" class="w-full"></div>
                    </div>
                `;
            } else if (type === 'protocol') {
                title = item ? 'Edit Kegiatan Protokol' : 'Tambah Kegiatan Protokol';
                fields = `
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium mb-1">Kegiatan</label><input type="text" id="kegiatan" value="${item?.kegiatan || ''}" class="w-full" required></div>
                        <div><label class="block text-sm font-medium mb-1">Pimpinan</label><input type="text" id="pimpinan" value="${item?.pimpinan || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Level</label>
                            <select id="level" class="w-full"><option ${item?.level === 'Formal' ? 'selected' : ''}>Formal</option><option ${item?.level === 'Non-Formal' ? 'selected' : ''}>Non-Formal</option></select>
                        </div>
                        <div><label class="block text-sm font-medium mb-1">Lokasi</label><input type="text" id="lokasi" value="${item?.lokasi || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Petugas</label><input type="text" id="petugas" value="${item?.petugas || ''}" class="w-full" placeholder="Pisahkan dengan koma"></div>
                        <div><label class="block text-sm font-medium mb-1">Tanggal</label><input type="date" id="tanggal" value="${formatDateInput(item?.tanggal)}" class="w-full"></div>
                    </div>
                `;
            } else if (type === 'team') {
                title = item ? 'Edit Anggota Tim' : 'Tambah Anggota Tim';
                fields = `
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium mb-1">Nama</label><input type="text" id="nama" value="${item?.nama || ''}" class="w-full" required></div>
                        <div><label class="block text-sm font-medium mb-1">Jabatan</label><input type="text" id="jabatan" value="${item?.jabatan || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Bidang</label><input type="text" id="bidang" value="${item?.bidang || ''}" class="w-full"></div>
                        <div><label class="block text-sm font-medium mb-1">Uraian Tugas</label><textarea id="tugas" rows="3" class="w-full">${item?.tugas || ''}</textarea></div>
                        <div><label class="block text-sm font-medium mb-1">Kontak</label><input type="number" id="kontak" value="${item?.kontak || ''}" class="w-full"></div>
                    </div>
                `;
            }

            modal.innerHTML = `
                <div class="modal-content p-6">
                    <div class="flex justify-between items-center mb-4">

        function closeModal() {
            const modal = document.getElementById('dynamic-modal');

        function saveData(event) {
            event.preventDefault();

            // Tentukan nama sheet berdasarkan modal type
            let sheetName = '';
            if (currentModalType === 'content') sheetName = 'content_planner';
            else if (currentModalType === 'schedule') sheetName = 'brs_schedule';
            else if (currentModalType === 'protocol') sheetName = 'protocol';
            else if (currentModalType === 'team') sheetName = 'team';

            if (currentModalType === 'content') {
                const newItem = {
                    id: currentEditItem?.id || Date.now(), // Jika add baru, pakai timestamp sebagai ID
                    judul: document.getElementById('judul').value,
                    konsep: document.getElementById('konsep').value,
                    jenis: document.getElementById('jenis').value,
                    postType: document.getElementById('postType').value,
                    progres: parseInt(document.getElementById('progres').value),
                    jadwal: document.getElementById('jadwal').value,
                    status: document.getElementById('status').value,
                    assignedTo: document.getElementById('assignedTo').value
                };

                // Tentukan action: 'add' atau 'update'
                const action = currentEditItem ? 'update' : 'add';

                // 1. Update Tampilan Sementara (Optimistic UI)
                if (currentEditItem) {
                    const index = db.contentPlanner.findIndex(i => i.id === currentEditItem.id);
                    if (index !== -1) db.contentPlanner[index] = newItem;
                    showToast('Menyimpan perubahan...');
                } else {
                    db.contentPlanner.push(newItem);
                    showToast('Menambahkan data...');
                }

                // 2. Kirim ke Spreadsheet (Async)
                sendDataToServer(action, sheetName, newItem);

            }
            // --- ULANGI LOGIKA DI ATAS UNTUK schedule, protocol, DAN team ---
            // Contoh singkat untuk schedule:
            else if (currentModalType === 'schedule') {
                const newItem = {
                    id: currentEditItem?.id || Date.now(),
                    judul: document.getElementById('judul').value,
                    tanggal: document.getElementById('tanggal').value,
                    pic_poster: document.getElementById('pic_poster').value,
                    pic_info: document.getElementById('pic_info').value,
                    pic_doc: document.getElementById('pic_doc').value,
                    pic_high: document.getElementById('pic_high').value
                };
                const action = currentEditItem ? 'update' : 'add';

                if (currentEditItem) {
                    const index = db.brsSchedule.findIndex(i => i.id === currentEditItem.id);
                    if (index !== -1) db.brsSchedule[index] = newItem;
                    showToast('Menyimpan...');
                } else {
                    db.brsSchedule.push(newItem);
                    showToast('Menambahkan...');
                }

                sendDataToServer(action, 'brs_schedule', newItem);
            }
            // (Lakukan hal yang sama untuk protocol dan team...)

            // Protocol & Team logic disesuaikan dengan pola di atas...
            else if (currentModalType === 'protocol') {
                const newItem = {
                    id: currentEditItem?.id || Date.now(),
                    kegiatan: document.getElementById('kegiatan').value,
                    pimpinan: document.getElementById('pimpinan').value,
                    level: document.getElementById('level').value,
                    lokasi: document.getElementById('lokasi').value,
                    petugas: document.getElementById('petugas').value,
                    tanggal: document.getElementById('tanggal').value
                };
                const action = currentEditItem ? 'update' : 'add';
                if (currentEditItem) {
                    const index = db.protocol.findIndex(i => i.id === currentEditItem.id);
                    if (index !== -1) db.protocol[index] = newItem;
                } else {
                    db.protocol.push(newItem);
                }
                sendDataToServer(action, 'protocol', newItem);
            }
            else if (currentModalType === 'team') {
                const newItem = {
                    id: currentEditItem?.id || Date.now(),
                    nama: document.getElementById('nama').value,
                    jabatan: document.getElementById('jabatan').value,
                    bidang: document.getElementById('bidang').value,
                    tugas: document.getElementById('tugas').value,
                    kontak: document.getElementById('kontak').value
                };
                const action = currentEditItem ? 'update' : 'add';
                if (currentEditItem) {
                    const index = db.team.findIndex(i => i.id === currentEditItem.id);
                    if (index !== -1) db.team[index] = newItem;
                } else {
                    db.team.push(newItem);
                }
                sendDataToServer(action, 'team', newItem);
            }

            closeModal();
            router(currentState);
        }

        function deleteItem(type, id) {
            if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
                let sheetName = '';
                let itemToDelete = null;

                // Tentukan sheet dan cari item yang akan dihapus (untuk dikirim ke server)
                if (type === 'content') {
                    sheetName = 'content_planner';
                    itemToDelete = db.contentPlanner.find(i => i.id === id);
                    db.contentPlanner = db.contentPlanner.filter(i => i.id !== id);
                } else if (type === 'schedule') {
                    sheetName = 'brs_schedule';
                    itemToDelete = db.brsSchedule.find(i => i.id === id);
                    db.brsSchedule = db.brsSchedule.filter(i => i.id !== id);
                } else if (type === 'protocol') {
                    sheetName = 'protocol';
                    itemToDelete = db.protocol.find(i => i.id === id);
                    db.protocol = db.protocol.filter(i => i.id !== id);
                } else if (type === 'team') {
                    sheetName = 'team';
                    itemToDelete = db.team.find(i => i.id === id);
                    db.team = db.team.filter(i => i.id !== id);
                }

                if (itemToDelete) {
                    // Hapus dari tampilan dulu
                    router(currentState);
                    showToast('Menghapus data...');

                    // Kirim perintah delete ke server
                    sendDataToServer('delete', sheetName, itemToDelete);
                }
            }
        }

        // Navigation
        function router(page) {
            currentState = page;

            // Update desktop sidebar
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${page}`);
            if (activeLink) activeLink.classList.add('active');

            // Update mobile sidebar
            const mobileActiveLink = document.getElementById(`mobile-nav-${page}`);
            if (mobileActiveLink) {
                document.querySelectorAll('#mobile-sidebar .sidebar-link').forEach(el => el.classList.remove('active'));
                mobileActiveLink.classList.add('active');
            }

            const contentDiv = document.getElementById('app-content');
            contentDiv.innerHTML = '';
            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth;
            contentDiv.classList.add('fade-in');

            switch (page) {
                case 'dashboard': renderDashboard(contentDiv); break;
                case 'planner': renderPlanner(contentDiv); break;
                case 'schedule': renderSchedule(contentDiv); break;
                case 'protocol': renderProtocol(contentDiv); break;
                case 'team': renderTeam(contentDiv); break;
            }
        }

                                        label: function (context) {

                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    stacked: true,
                                    ticks: { font: { size: 11 } }
                                },
                                y: {
                                    stacked: true,
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Jumlah Tugas',
                                        font: { size: 11 }
                                    },
                                    ticks: { stepSize: 1, font: { size: 11 } }
                                }
                            }
                        }
                    });
                }
            }, 100);
        }

        // Content Planner
        function renderPlanner(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div><h2 class="text-2xl md:text-3xl font-bold text-slate-800">Content Planner</h2><p class="text-sm md:text-base text-slate-500 mt-1">Manajemen konten media sosial & publikasi</p></div>
                    <button onclick="openModal('content')" class="btn-primary flex items-center gap-2 shadow-md text-sm md:text-base"><i class="fa-solid fa-plus"></i> Tambah Konten</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-xs md:text-sm text-left text-slate-600">
                            <thead class="text-xs text-slate-700 uppercase bg-slate-50 border-b border-slate-200">
                                <tr><th class="px-3 md:px-6 py-3">Judul</th><th class="px-3 md:px-6 py-3">Jenis</th><th class="px-3 md:px-6 py-3">Progres</th><th class="px-3 md:px-6 py-3 hidden sm:table-cell">Jadwal</th><th class="px-3 md:px-6 py-3">Status</th><th class="px-3 md:px-6 py-3 hidden md:table-cell">PIC</th><th class="px-3 md:px-6 py-3 text-center">Aksi</th></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${db.contentPlanner.map(item => `
                                    <tr class="hover:bg-slate-50 transition-colors cursor-pointer" onclick="showDetail('content', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                                        <td class="px-3 md:px-6 py-3 md:py-4"><div class="font-medium text-slate-800 text-xs md:text-sm">${item.judul.length > 20 ? item.judul.substring(0, 20) + '...' : item.judul}</div><div class="text-xs text-slate-400 hidden sm:block">${item.konsep}</div></td>
                                        <td class="px-3 md:px-6 py-3 md:py-4"><span class="px-1.5 md:px-2 py-0.5 md:py-1 rounded-full text-[10px] md:text-xs font-medium ${item.jenis === 'Hard Selling' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}">${item.jenis}</span></td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 w-24 md:w-32"><div class="w-full bg-slate-200 rounded-full h-1.5 md:h-2"><div class="bg-stats-500 h-1.5 md:h-2 rounded-full" style="width: ${item.progres}%"></div></div><div class="text-right text-[10px] md:text-xs text-slate-400 mt-1">${item.progres}%</div></td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 whitespace-nowrap hidden sm:table-cell">${formatDate(item.jadwal)}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4"><span class="px-1.5 md:px-2 py-0.5 md:py-1 rounded text-[10px] md:text-xs font-bold ${item.status === 'Posted' ? 'bg-green-100 text-green-700' : item.status === 'Done' ? 'bg-blue-100 text-blue-700' : 'bg-yellow-100 text-yellow-700'}">${item.status}</span></td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 hidden md:table-cell"><i class="fa-solid fa-user mr-1 text-stats-400"></i>${item.assignedTo?.split(' ')[0] || '-'}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 text-center whitespace-nowrap" onclick="event.stopPropagation()">
                                            <button onclick="openModal('content', ${JSON.stringify(item).replace(/"/g, '&quot;')})" class="text-stats-500 hover:text-stats-700 mx-1"><i class="fa-solid fa-pen-to-square text-sm md:text-base"></i></button>
                                            <button onclick="deleteItem('content', ${item.id})" class="text-red-400 hover:text-red-600 mx-1"><i class="fa-solid fa-trash text-sm md:text-base"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Jadwal Rilis
        function renderSchedule(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div><h2 class="text-2xl md:text-3xl font-bold text-slate-800">Jadwal Rilis (BRS)</h2><p class="text-sm md:text-base text-slate-500 mt-1">Monitoring rilis BPS dan publikasi statistik</p></div>
                    <button onclick="openModal('schedule')" class="btn-primary flex items-center gap-2 text-sm md:text-base"><i class="fa-solid fa-plus"></i> Tambah Jadwal</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-xs md:text-sm text-left text-slate-600">
                            <thead class="text-xs text-slate-700 uppercase bg-slate-50 border-b">
                                <tr><th class="px-3 md:px-6 py-3">Tanggal</th><th class="px-3 md:px-6 py-3">Judul Rilis</th><th class="px-3 md:px-6 py-3 hidden sm:table-cell">PIC Poster</th><th class="px-3 md:px-6 py-3 hidden md:table-cell">PIC Info</th><th class="px-3 md:px-6 py-3 text-center">Aksi</th></tr>
                            </thead>
                            <tbody>
                                ${db.brsSchedule.map(item => `
                                    <tr class="border-b hover:bg-slate-50 transition-colors cursor-pointer" onclick="showDetail('schedule', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                                        <td class="px-3 md:px-6 py-3 md:py-4 font-medium whitespace-nowrap">${formatDate(item.tanggal)}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4">${item.judul.length > 25 ? item.judul.substring(0, 25) + '...' : item.judul}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 hidden sm:table-cell">${item.pic_poster?.split(' ')[0] || '-'}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 hidden md:table-cell">${item.pic_info?.split(' ')[0] || '-'}</td>
                                        <td class="px-3 md:px-6 py-3 md:py-4 text-center whitespace-nowrap" onclick="event.stopPropagation()">
                                            <button onclick="openModal('schedule', ${JSON.stringify(item).replace(/"/g, '&quot;')})" class="text-stats-500 hover:text-stats-700 mx-1"><i class="fa-solid fa-pen-to-square"></i></button>
                                            <button onclick="deleteItem('schedule', ${item.id})" class="text-red-400 hover:text-red-600 mx-1"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // Protokol & MC
        function renderProtocol(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div><h2 class="text-2xl md:text-3xl font-bold text-slate-800">Protokoler & MC</h2><p class="text-sm md:text-base text-slate-500 mt-1">Manajemen kegiatan keprotokolan dan MC</p></div>
                    <button onclick="openModal('protocol')" class="btn-primary flex items-center gap-2 text-sm md:text-base"><i class="fa-solid fa-plus"></i> Tambah Kegiatan</button>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    ${db.protocol.map(item => `
                        <div class="bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-all cursor-pointer" onclick="showDetail('protocol', ${JSON.stringify(item).replace(/"/g, '&quot;')})">
                            <div class="flex flex-col md:flex-row justify-between md:items-center gap-3">
                                <div class="flex items-start gap-3 md:gap-4">
                                    <div class="w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center shrink-0 ${item.level === 'Formal' ? 'bg-indigo-100 text-indigo-600' : 'bg-orange-100 text-orange-600'}"><i class="fa-solid ${item.level === 'Formal' ? 'fa-user-tie' : 'fa-microphone-lines'} text-base md:text-xl"></i></div>
                                    <div><h4 class="font-bold text-slate-800 text-sm md:text-lg">${item.kegiatan.length > 30 ? item.kegiatan.substring(0, 30) + '...' : item.kegiatan}</h4><p class="text-xs md:text-sm text-slate-500"><i class="fa-solid fa-user-clock mr-1"></i> ${item.pimpinan}</p><p class="text-xs md:text-sm text-slate-500 hidden sm:block"><i class="fa-solid fa-map-pin mr-1"></i> ${item.lokasi}</p></div>
                                </div>
                                <div class="flex items-center gap-2 md:gap-3" onclick="event.stopPropagation()">
                                    <span class="px-2 md:px-3 py-0.5 md:py-1 rounded text-[10px] md:text-xs font-bold ${item.level === 'Formal' ? 'bg-indigo-100 text-indigo-700' : 'bg-orange-100 text-orange-700'}">${item.level}</span>
                                    <button onclick="openModal('protocol', ${JSON.stringify(item).replace(/"/g, '&quot;')})" class="text-stats-500 hover:text-stats-700"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button onclick="deleteItem('protocol', ${item.id})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Direktori Tim
        function renderTeam(container) {
            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div><h2 class="text-2xl md:text-3xl font-bold text-slate-800">Direktori Tim</h2><p class="text-sm md:text-base text-slate-500 mt-1">Profil anggota dan uraian tugas</p></div>
                    <button onclick="openModal('team')" class="btn-primary flex items-center gap-2 text-sm md:text-base"><i class="fa-solid fa-plus"></i> Tambah Anggota</button>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                    ${db.team.map(member => {
                const taskCount = db.contentPlanner.filter(c => c.assignedTo === member.nama).length;
                return `
                            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-lg transition-all cursor-pointer card-hover" onclick="showDetail('team', ${JSON.stringify(member).replace(/"/g, '&quot;')})">
                                <div class="h-20 md:h-28 bg-gradient-to-r from-stats-600 to-stats-800 relative">
                                    <div class="absolute -bottom-8 md:-bottom-10 left-4 md:left-6 w-14 h-14 md:w-20 md:h-20 rounded-full border-4 border-white bg-gradient-to-br from-stats-400 to-stats-600 flex items-center justify-center text-white text-xl md:text-3xl font-bold shadow-lg">${member.nama.charAt(0)}</div>
                                </div>
                                <div class="pt-10 md:pt-12 pb-4 md:pb-5 px-4 md:px-5">
                                    <h3 class="font-bold text-base md:text-xl text-slate-800">${member.nama.split(' ')[0]}</h3>
                                    <p class="text-xs md:text-sm text-stats-600 font-semibold mb-1">${member.jabatan}</p>
                                    <span class="inline-block px-1.5 md:px-2 py-0.5 bg-slate-100 text-slate-500 text-[8px] md:text-[10px] rounded-full uppercase font-bold mb-3">${member.bidang}</span>
                                    <div class="flex items-center justify-between pt-3 border-t border-slate-100">
                                        <div><p class="text-[10px] md:text-xs text-slate-400">Total Tugas</p><p class="text-base md:text-xl font-bold text-stats-600">${taskCount}</p></div>
                                        <div class="flex gap-2" onclick="event.stopPropagation()">
                                            <button onclick="openModal('team', ${JSON.stringify(member).replace(/"/g, '&quot;')})" class="text-stats-500 hover:text-stats-700 p-1 md:p-2"><i class="fa-solid fa-pen-to-square text-sm md:text-base"></i></button>
                                            <button onclick="deleteItem('team', ${member.id})" class="text-red-400 hover:text-red-600 p-1 md:p-2"><i class="fa-solid fa-trash text-sm md:text-base"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
            }).join('')}
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            fetchDataFromSheets();
        });
    </script>
</body>

</html>
