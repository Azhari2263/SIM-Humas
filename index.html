    <script>
        // KONFIGURASI - GANTI DENGAN URL WEB APP ANDA
        const GOOGLE_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbzqG9cQMjnpv-bOyifs4kfdpPYdEB5A5a7lw64Yod7GtfFKN4kcwN3BhYyeTQ90n4p7/exec';

        // State management
        let db = {
            contentPlanner: [],
            brsSchedule: [],
            protocol: [],
            team: [],
            tickets: [],
            assets: [],
            monitoring: []
        };
        let currentUser = JSON.parse(localStorage.getItem('sim_humas_user')) || null;
        let currentState = 'dashboard';
        let isLoading = false;
        let currentEditItem = null;
        let currentModalType = null;
        let chartInstance = null;
        let sentimentChartInstance = null;

        // Fungsi khusus untuk mengirim data ke Google Apps Script
        async function sendDataToServer(action, sheetName, item) {
            try {
                const payload = {
                    action: action,
                    sheet: sheetName,
                    item: item
                };

                const response = await fetch(GOOGLE_SHEETS_API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (!result.success) throw new Error('Gagal sync ke server');

                // Jika sukses sinkron, panggil fetch ulang data agar web update
                await fetchDataFromSheets();

            } catch (error) {
                console.error('Sync Error:', error);
                showToast('Gagal menyimpan ke Spreadsheet (Cek Console)', 'error');
            }
        }

        // Auth & Role Simulation Functions
        function checkAuth() {
            if (!currentUser) {
                document.getElementById('app-layout').classList.add('hidden');
                document.getElementById('login-layout').classList.remove('hidden');
                renderLoginScreen();
            } else {
                document.getElementById('login-layout').classList.add('hidden');
                document.getElementById('app-layout').classList.remove('hidden');
                updateUserProfileUI();
                fetchDataFromSheets();
            }
        }

        function renderLoginScreen() {
            const loginLayout = document.getElementById('login-layout');
            loginLayout.innerHTML = `

                        </div>
                        <h2 class="text-2xl font-bold tracking-tight">SIM HUMAS BPS</h2>
                        <p class="text-xs text-stats-300 mt-1">Provinsi Kalimantan Barat</p>
                    </div>
                    
                    <form onsubmit="handleLogin(event)" class="space-y-4 text-slate-800">
                        <div>
                            <label class="block text-xs font-semibold text-stats-100 mb-1">Nama Pengguna</label>
                            <input type="text" id="login-username" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none" placeholder="Contoh: azhari" value="azhari" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-stats-100 mb-1">Kata Sandi</label>
                            <input type="password" id="login-password" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none" placeholder="••••••••" value="password" required>
                        </div>
                        <button type="submit" class="w-full btn-primary bg-gradient-to-r from-stats-500 to-stats-700 hover:from-stats-600 hover:to-stats-800 text-white font-bold py-2.5 rounded-lg text-sm transition-all shadow-lg">
                            Masuk ke Sistem
                        </button>
                    </form>
                    
                    <div class="mt-6 border-t border-white/10 pt-4">
                        <p class="text-center text-xs text-stats-300 mb-3 font-medium">Uji Coba Peran Cepat (RBAC):</p>
                        <div class="grid grid-cols-2 gap-2 text-center text-[10px]">
                            <button onclick="quickLogin('admin')" class="py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg font-medium transition-all text-white">
                                <i class="fa-solid fa-user-shield block text-sm mb-1 text-stats-300"></i> Admin / Staf IT

            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check text-green-500 text-lg"></i>' :
                type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500 text-lg"></i>' :

            toast.innerHTML = `${icon} <span class="text-sm font-medium">${message}</span>`;

        // Fetch data dari Google Sheets
        async function fetchDataFromSheets() {
            if (isLoading) return;
            isLoading = true;

            try {
                const response = await fetch(GOOGLE_SHEETS_API_URL);
                if (!response.ok) throw new Error('Gagal mengambil data');

                const data = await response.json();

                db.contentPlanner = data.contentPlanner || [];
                db.brsSchedule = data.brsSchedule || [];
                db.protocol = data.protocol || [];
                db.team = data.team || [];

                // Jika sheet tambahan belum dideploy, pakai data mockup default agar modul baru tetap jalan
                if (!data.tickets) {
                    db.tickets = db.tickets.length > 0 ? db.tickets : getInitialTickets();
                    db.assets = db.assets.length > 0 ? db.assets : getInitialAssets();
                    db.monitoring = db.monitoring.length > 0 ? db.monitoring : getInitialMonitoring();
                } else {
                    db.tickets = data.tickets;
                    db.assets = data.assets;
                    db.monitoring = data.monitoring;
                }

                const now = new Date();
                const dateStr = now.toLocaleDateString('id-ID') + ' ' + now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('last-sync-date').textContent = dateStr;
                const mobileSync = document.getElementById('mobile-last-sync-date');
                if (mobileSync) mobileSync.textContent = dateStr;

                showToast('Data berhasil disinkronkan dari Google Sheets!');
                router(currentState);

            } catch (error) {
                console.error('Error fetching data:', error);
                showToast('Gagal sinkron data: ' + error.message, 'error');
                useDefaultData();
            } finally {
                isLoading = false;
            }
        }

        function saveData(event) {
            event.preventDefault();

            // Tentukan nama sheet berdasarkan modal type
            let sheetName = '';
            if (currentModalType === 'content') sheetName = 'content_planner';
            else if (currentModalType === 'schedule') sheetName = 'brs_schedule';
            else if (currentModalType === 'protocol') sheetName = 'protocol';
            else if (currentModalType === 'team') sheetName = 'team';

            if (currentModalType === 'content') {
                const newItem = {
                    id: currentEditItem?.id || Date.now(), // Jika add baru, pakai timestamp sebagai ID
                    judul: document.getElementById('judul').value,
                    konsep: document.getElementById('konsep').value,
                    jenis: document.getElementById('jenis').value,
                    postType: document.getElementById('postType').value,
                    progres: parseInt(document.getElementById('progres').value),
                    jadwal: document.getElementById('jadwal').value,
                    status: document.getElementById('status').value,
                    assignedTo: document.getElementById('assignedTo').value
                };

                // Tentukan action: 'add' atau 'update'
                const action = currentEditItem ? 'update' : 'add';

                // 1. Update Tampilan Sementara (Optimistic UI)
                if (currentEditItem) {
                    const index = db.contentPlanner.findIndex(i => i.id === currentEditItem.id);
                    if (index !== -1) db.contentPlanner[index] = newItem;
                    showToast('Menyimpan perubahan...');
                } else {
                    db.contentPlanner.push(newItem);
                    showToast('Menambahkan data...');
                }

                // 2. Kirim ke Spreadsheet (Async)
                sendDataToServer(action, sheetName, newItem);

            }

        // Navigation with Role Guards
        function router(page) {
            const allowedPages = {
                admin: ['dashboard', 'planner', 'schedule', 'protocol', 'tickets', 'assets', 'monitoring', 'team'],
                ketua: ['dashboard', 'planner', 'schedule', 'protocol', 'tickets', 'assets', 'monitoring', 'team'],
                staf: ['dashboard', 'planner', 'schedule', 'protocol', 'tickets', 'assets', 'monitoring'],
                internal: ['dashboard', 'tickets', 'assets']
            };

            const userRole = currentUser ? currentUser.role : 'internal';
            if (!allowedPages[userRole].includes(page)) {
                page = 'dashboard';
            }

            currentState = page;

            // Update desktop sidebar
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${page}`);
            if (activeLink) activeLink.classList.add('active');

            // Update mobile sidebar
            const mobileActiveLink = document.getElementById(`mobile-nav-${page}`);
            if (mobileActiveLink) {
                document.querySelectorAll('#mobile-sidebar .sidebar-link').forEach(el => el.classList.remove('active'));
                mobileActiveLink.classList.add('active');
            }

            const contentDiv = document.getElementById('app-content');
            contentDiv.innerHTML = '';
            contentDiv.classList.remove('fade-in');
            void contentDiv.offsetWidth;
            contentDiv.classList.add('fade-in');

            switch (page) {
                case 'dashboard': renderDashboard(contentDiv); break;
                case 'planner': renderPlanner(contentDiv); break;
                case 'schedule': renderSchedule(contentDiv); break;
                case 'protocol': renderProtocol(contentDiv); break;
                case 'tickets': renderTickets(contentDiv); break;
                case 'assets': renderAssets(contentDiv); break;
                case 'monitoring': renderMonitoring(contentDiv); break;
                case 'team': renderTeam(contentDiv); break;
            }
        }

        // Module: Permintaan Layanan (Ticketing)
        function renderTickets(container) {
            const isInternal = currentUser.role === 'internal';
            const isAdminOrKetua = currentUser.role === 'admin' || currentUser.role === 'ketua';

            let filteredTickets = db.tickets;
            if (isInternal) {
                filteredTickets = db.tickets.filter(t => t.pengaju.includes(currentUser.name) || t.pengaju.includes("Seksi"));
            }

            let ticketCards = filteredTickets.map(t => {
                let statusBadge = '';
                if (t.status === 'Pending') {
                    statusBadge = `<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs font-bold"><i class="fa-regular fa-clock mr-1"></i>Pending</span>`;
                } else if (t.status === 'Approved') {
                    statusBadge = `<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold"><i class="fa-solid fa-check mr-1"></i>Disetujui</span>`;
                } else {
                    statusBadge = `<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-bold"><i class="fa-solid fa-times mr-1"></i>Ditolak</span>`;
                }

                let actions = '';
                if (isAdminOrKetua && t.status === 'Pending') {
                    actions = `
                        <div class="mt-4 pt-3 border-t border-slate-100 flex gap-2 justify-end">
                            <button onclick="approveTicket(${t.id})" class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white text-xs font-medium rounded transition-all">
                                <i class="fa-solid fa-check mr-1"></i> Setujui & Tugaskan
                            </button>
                            <button onclick="rejectTicket(${t.id})" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white text-xs font-medium rounded transition-all">
                                <i class="fa-solid fa-times mr-1"></i> Tolak
                            </button>
                        </div>
                    `;
                } else if (t.status === 'Approved' && t.pic) {
                    actions = `
                        <div class="mt-2 text-xs text-slate-500">
                            <i class="fa-solid fa-user mr-1 text-stats-500"></i> PIC: <strong>${t.pic}</strong>
                        </div>
                    `;
                }

                return `
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded-full text-[10px] uppercase font-bold">${t.jenis}</span>
                                <h4 class="font-bold text-slate-800 text-base mt-2">${t.judul}</h4>
                            </div>
                            ${statusBadge}
                        </div>
                        <p class="text-xs text-slate-500 mt-2 font-medium"><i class="fa-regular fa-building mr-1"></i> Pengaju: ${t.pengaju} (${t.bidang})</p>
                        <p class="text-xs text-slate-600 mt-2">${t.detail}</p>
                        <p class="text-xs text-red-500 mt-3 font-semibold"><i class="fa-regular fa-calendar-xmark mr-1"></i> Batas Waktu: ${formatDate(t.deadline)}</p>
                        ${actions}
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Permintaan Layanan Humas</h2>

                            <i class="fa-solid fa-ticket text-4xl mb-2"></i>
                            <p>Belum ada permintaan layanan.</p>
                        </div>
                    `}
                </div>
            `;

                bidang: "Statistik",
                jenis: document.getElementById('req-type').value,
                judul: document.getElementById('req-title').value,
                deadline: document.getElementById('req-deadline').value,
                detail: document.getElementById('req-detail').value,
                status: "Pending",
                pic: ""
            };
            db.tickets.push(newTicket);
            showToast("Permintaan layanan berhasil dikirim!");
            closeModal();
            router('tickets');
        }

        window.approveTicket = function (id) {
            const ticket = db.tickets.find(t => t.id === id);
            if (!ticket) return;

            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'assign-pic-modal';
            modal.innerHTML = `
                <div class="modal-content p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-slate-800">Setujui & Tugaskan PIC</h3>
                        <button onclick="this.closest('.modal').remove()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-xl"></i></button>
                    </div>
                    <form onsubmit="confirmApproveTicket(event, ${id})" class="space-y-4">
                        <div>
                            <p class="text-xs text-slate-500 mb-2">Pilih anggota tim humas yang akan bertanggung jawab untuk pengerjaan:</p>
                            <label class="block text-sm font-medium mb-1">Ditugaskan ke (PIC)</label>
                            <select id="assign-pic-select" class="w-full">
                                ${db.team.map(m => `<option value="${m.nama}">${m.nama} (${m.jabatan})</option>`).join('')}
                            </select>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button type="submit" class="btn-primary flex-1"><i class="fa-solid fa-check mr-2"></i> Konfirmasi</button>
                            <button type="button" onclick="this.closest('.modal').remove()" class="btn-secondary flex-1">Batal</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);
        }

        window.confirmApproveTicket = function (event, ticketId) {
            event.preventDefault();
            const ticket = db.tickets.find(t => t.id === ticketId);
            const picName = document.getElementById('assign-pic-select').value;

            if (ticket) {
                ticket.status = 'Approved';
                ticket.pic = picName;

                const newContent = {
                    id: Date.now(),
                    judul: `[TIKET] ${ticket.judul}`,
                    konsep: `Permintaan dari ${ticket.pengaju}. Detail: ${ticket.detail}`,
                    jenis: ticket.jenis === 'Infografis' ? 'Soft Selling' : 'Informasi',
                    postType: ticket.jenis === 'Pembuatan Video' ? 'Reels' : 'Carousel',
                    progres: 0,
                    jadwal: ticket.deadline,
                    status: 'In Progress',
                    assignedTo: picName
                };
                db.contentPlanner.push(newContent);
                showToast(`Tiket disetujui! Tugas baru dibuat di Content Planner untuk ${picName}.`);
            }

            document.getElementById('assign-pic-modal').remove();
            router('tickets');
        }

        window.rejectTicket = function (id) {
            if (confirm("Apakah Anda yakin ingin menolak permintaan ini?")) {
                const ticket = db.tickets.find(t => t.id === id);
                if (ticket) {
                    ticket.status = 'Rejected';
                    showToast("Permintaan ditolak.", "info");
                    router('tickets');
                }
            }
        }

        // Module: Bank Desain (Digital Asset Management)
        function renderAssets(container) {
            const categories = ['Semua', 'Template', 'Logo', 'Foto', 'Dokumen'];
            let activeCategory = 'Semua';

            function drawAssets() {
                let filteredAssets = db.assets;
                if (activeCategory !== 'Semua') {
                    filteredAssets = db.assets.filter(a => a.kategori === activeCategory);
                }

                let assetCards = filteredAssets.map(a => `
                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition-all flex flex-col">
                        <div class="h-32 bg-slate-100 relative overflow-hidden shrink-0">
                            <img src="${a.preview}" alt="${a.nama}" class="w-full h-full object-cover">
                            <span class="absolute top-2 left-2 px-2 py-0.5 bg-black/60 backdrop-blur-sm text-white rounded-full text-[10px] font-bold uppercase">${a.kategori}</span>
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm truncate" title="${a.nama}">${a.nama}</h4>
                                <p class="text-[10px] text-slate-400 mt-1">Ukuran: ${a.ukuran} • Oleh: ${a.pengunggah}</p>
                            </div>
                            <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center text-xs">
                                <span class="text-slate-400"><i class="fa-regular fa-calendar mr-1"></i>${formatDate(a.tanggal)}</span>
                                <a href="#" onclick="event.preventDefault(); showToast('Simulasi Pengunduhan file: ${a.nama}')" class="text-stats-600 hover:text-stats-800 font-semibold flex items-center gap-1">
                                    <i class="fa-solid fa-download"></i> Unduh
                                </a>
                            </div>
                        </div>
                    </div>
                `).join('');

                container.querySelector('#assets-grid').innerHTML = assetCards.length > 0 ? assetCards : `
                    <div class="col-span-full bg-white p-8 text-center text-slate-400 rounded-xl border border-dashed border-slate-300">
                        <i class="fa-solid fa-folder-open text-4xl mb-2"></i>
                        <p>Belum ada aset digital dalam kategori ini.</p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Bank Desain & Dokumentasi</h2>
                        <p class="text-sm md:text-base text-slate-500 mt-1">Penyimpanan aset digital kehumasan (Digital Asset Management)</p>
                    </div>
                    <button onclick="openAssetUploadModal()" class="btn-primary flex items-center gap-2 shadow-md text-sm md:text-base">
                        <i class="fa-solid fa-upload"></i> Unggah Aset
                    </button>
                </div>

                <!-- Category Filters -->
                <div class="flex flex-wrap gap-2 mb-6" id="assets-filter-bar">
                    ${categories.map(c => `
                        <button onclick="filterAssets('${c}', this)" class="asset-filter-btn px-4 py-1.5 rounded-full text-xs font-semibold border ${c === 'Semua' ? 'bg-stats-600 text-white border-stats-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'} transition-all">${c}</button>
                    `).join('')}
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="assets-grid">
                    <!-- Cards will be drawn here -->
                </div>
            `;

            window.filterAssets = function (cat, btn) {
                activeCategory = cat;
                document.querySelectorAll('.asset-filter-btn').forEach(b => {
                    b.className = 'asset-filter-btn px-4 py-1.5 rounded-full text-xs font-semibold border bg-white text-slate-600 border-slate-200 hover:bg-slate-50 transition-all';
                });
                btn.className = 'asset-filter-btn px-4 py-1.5 rounded-full text-xs font-semibold border bg-stats-600 text-white border-stats-600 transition-all';
                drawAssets();
            };

            window.openAssetUploadModal = function () {
                currentModalType = 'asset_upload';
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.id = 'dynamic-modal';
                modal.innerHTML = `
                    <div class="modal-content p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-slate-800">Unggah Aset Baru</h3>
                            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-xl"></i></button>
                        </div>
                        <form onsubmit="saveAssetUpload(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Nama Aset / Berkas</label>
                                <input type="text" id="asset-name" class="w-full" placeholder="Contoh: Template Infografis Inflasi.psd" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Kategori</label>
                                <select id="asset-cat" class="w-full">
                                    <option value="Template">Template Desain</option>
                                    <option value="Logo">Logo & Brand Kit</option>
                                    <option value="Foto">Foto Dokumentasi</option>
                                    <option value="Dokumen">Dokumen (Press Release / PDF)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Unggah Berkas (Simulasi)</label>
                                <input type="file" id="asset-file" class="w-full border border-dashed border-slate-300 p-4 rounded-lg bg-slate-50 cursor-pointer" required>
                            </div>
                            <div class="flex gap-3 mt-6">
                                <button type="submit" class="btn-primary flex-1"><i class="fa-solid fa-upload mr-2"></i> Unggah</button>
                                <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Batal</button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(modal);
            };

            window.saveAssetUpload = function (event) {
                event.preventDefault();
                const fileInput = document.getElementById('asset-file');
                const fileName = document.getElementById('asset-name').value;
                const fileCat = document.getElementById('asset-cat').value;

                let fileSize = "2.4 MB";
                if (fileInput.files && fileInput.files[0]) {
                    const bytes = fileInput.files[0].size;
                    fileSize = (bytes / (1024 * 1024)).toFixed(1) + " MB";
                }

                const newAsset = {
                    id: Date.now(),
                    nama: fileName,
                    kategori: fileCat,
                    ukuran: fileSize,
                    pengunggah: currentUser.name || "Staf Humas",
                    tanggal: new Date().toISOString().split('T')[0],
                    preview: fileCat === 'Foto' ? 'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=150' : 'https://images.unsplash.com/photo-1626785774573-4b799315345d?w=150'
                };

                db.assets.push(newAsset);
                showToast("Aset digital berhasil diunggah!");
                closeModal();
                drawAssets();
            };

            drawAssets();
        }

        // Module: Media Monitoring & Sentiment Analysis
        function renderMonitoring(container) {
            const posCount = db.monitoring.filter(m => m.sentimen === 'Positif').length;
            const netCount = db.monitoring.filter(m => m.sentimen === 'Netral').length;
            const negCount = db.monitoring.filter(m => m.sentimen === 'Negatif').length;
            const totalCount = db.monitoring.length;
            const positiveRate = totalCount > 0 ? Math.round((posCount / totalCount) * 100) : 0;

            let newsRows = db.monitoring.map(m => {
                let badge = '';
                if (m.sentimen === 'Positif') {
                    badge = `<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded text-xs font-bold"><i class="fa-solid fa-face-smile mr-1"></i>Positif</span>`;
                } else if (m.sentimen === 'Negatif') {
                    badge = `<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded text-xs font-bold"><i class="fa-solid fa-face-frown mr-1"></i>Negatif</span>`;
                } else {
                    badge = `<span class="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-xs font-bold"><i class="fa-solid fa-face-meh mr-1"></i>Netral</span>`;
                }

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-semibold text-slate-800">${m.media}</td>
                        <td class="px-6 py-4">
                            <div class="font-medium text-slate-800">${m.judul}</div>
                            <div class="text-xs text-slate-400 mt-1">${m.ringkasan}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs text-slate-500">${formatDate(m.tanggal)}</td>
                        <td class="px-6 py-4 whitespace-nowrap">${badge}</td>
                        <td class="px-6 py-4 text-center whitespace-nowrap text-xs font-semibold">
                            <a href="${m.url}" target="_blank" class="text-stats-600 hover:underline"><i class="fa-solid fa-arrow-up-right-from-square mr-1"></i>Kunjungi</a>
                        </td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Media Monitoring</h2>
                        <p class="text-sm md:text-base text-slate-500 mt-1">Pemantauan rilis berita BPS Kalbar di media online Kalimantan Barat</p>
                    </div>
                    <button onclick="openAddMonitoringModal()" class="btn-primary flex items-center gap-2 text-sm md:text-base">
                        <i class="fa-solid fa-plus"></i> Tambah Kliping Berita
                    </button>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase">Total Berita</p>
                            <p class="text-2xl font-bold text-slate-800 mt-1">${totalCount}</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-newspaper"></i></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase">Sentimen Positif</p>
                            <p class="text-2xl font-bold text-green-600 mt-1">${posCount}</p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center text-green-600 text-xl"><i class="fa-regular fa-face-smile"></i></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase">Sentimen Negatif</p>
                            <p class="text-2xl font-bold text-red-600 mt-1">${negCount}</p>
                        </div>
                        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center text-red-600 text-xl"><i class="fa-regular fa-face-frown"></i></div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <p class="text-xs text-slate-400 font-semibold uppercase">Indeks Sentimen</p>
                            <p class="text-2xl font-bold text-stats-600 mt-1">${positiveRate}%</p>
                        </div>
                        <div class="w-12 h-12 bg-stats-100 rounded-lg flex items-center justify-center text-stats-600 text-xl"><i class="fa-solid fa-percent"></i></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left text-slate-600">
                                <thead class="text-xs text-slate-700 uppercase bg-slate-50 border-b">
                                    <tr>
                                        <th class="px-6 py-3">Media</th>
                                        <th class="px-6 py-3">Berita</th>
                                        <th class="px-6 py-3">Tanggal</th>
                                        <th class="px-6 py-3">Sentimen</th>
                                        <th class="px-6 py-3 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${newsRows}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm flex flex-col items-center">
                        <h3 class="font-bold text-slate-800 text-base mb-4 w-full">Analisis Sentimen Media</h3>
                        <div class="w-48 h-48 relative">
                            <canvas id="mediaSentimentChart" width="200" height="200"></canvas>
                        </div>
                        <div class="mt-6 flex flex-col gap-2 w-full text-xs text-slate-600">
                            <div class="flex justify-between items-center"><span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Positif</span><strong>${posCount} (${totalCount ? Math.round((posCount / totalCount) * 100) : 0}%)</strong></div>
                            <div class="flex justify-between items-center"><span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-slate-400 rounded-full"></span> Netral</span><strong>${netCount} (${totalCount ? Math.round((netCount / totalCount) * 100) : 0}%)</strong></div>
                            <div class="flex justify-between items-center"><span class="flex items-center gap-1.5"><span class="w-3 h-3 bg-red-500 rounded-full"></span> Negatif</span><strong>${negCount} (${totalCount ? Math.round((negCount / totalCount) * 100) : 0}%)</strong></div>
                        </div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const ctx = document.getElementById('mediaSentimentChart')?.getContext('2d');
                if (ctx) {
                    if (sentimentChartInstance) sentimentChartInstance.destroy();
                    sentimentChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Positif', 'Netral', 'Negatif'],
                            datasets: [{
                                data: [posCount, netCount, negCount],
                                backgroundColor: ['#10b981', '#94a3b8', '#ef4444'],
                                borderHeight: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false }
                            },
                            cutout: '70%'
                        }
                    });
                }
            }, 100);
        }

        window.openAddMonitoringModal = function () {
            currentModalType = 'add_monitoring';
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'dynamic-modal';
            modal.innerHTML = `
                <div class="modal-content p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-slate-800">Tambah Kliping Berita</h3>
                        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-xl"></i></button>
                    </div>
                    <form onsubmit="saveMonitoringItem(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Nama Media</label>
                            <input type="text" id="mon-media" class="w-full" placeholder="Contoh: Pontianak Post" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Judul Berita</label>
                            <input type="text" id="mon-title" class="w-full" placeholder="Masukkan judul utama berita..." required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Sentimen Berita</label>
                            <select id="mon-sentiment" class="w-full">
                                <option value="Positif">Positif</option>
                                <option value="Netral">Netral</option>
                                <option value="Negatif">Negatif</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Kliping Ringkasan Berita</label>
                            <textarea id="mon-summary" rows="3" class="w-full" placeholder="Tuliskan intisari berita singkat..." required></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">URL Berita</label>
                            <input type="url" id="mon-url" class="w-full" placeholder="https://example.com/link-berita" required>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button type="submit" class="btn-primary flex-1"><i class="fa-solid fa-save mr-2"></i> Simpan Kliping</button>
                            <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Batal</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);
        }

        window.saveMonitoringItem = function (event) {
            event.preventDefault();
            const newMon = {
                id: Date.now(),
                media: document.getElementById('mon-media').value,
                judul: document.getElementById('mon-title').value,
                tanggal: new Date().toISOString().split('T')[0],
                sentimen: document.getElementById('mon-sentiment').value,
                ringkasan: document.getElementById('mon-summary').value,
                url: document.getElementById('mon-url').value
            };
            db.monitoring.push(newMon);
            showToast("Kliping berita berhasil ditambahkan!");
            closeModal();
            router('monitoring');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });
    </script>
</body>

</html>
