                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-bullhorn w-5 text-sm"></i> BRS Rilis
                </button>
                <button onclick="router('hari_besar')" id="nav-hari_besar" data-roles="admin,kepala,koordinator,tim"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-heart w-5 text-sm"></i> Ucapan Hari Besar
                </button>
                <button onclick="router('tickets')" id="nav-tickets" data-roles="admin,kepala,koordinator,tim,pemohon"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-ticket w-5 text-sm"></i> Layanan Humas
                </button>
                <button onclick="router('monitoring')" id="nav-monitoring" data-roles="admin,kepala,koordinator,tim"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-magnifying-glass-chart w-5 text-sm"></i> Media Monitoring
                </button>
                <button onclick="router('rekap_kegiatan')" id="nav-rekap_kegiatan"
                    data-roles="admin,kepala,koordinator,tim"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-chart-simple w-5 text-sm"></i> SLA & Rekap Tugas
                </button>
                <button onclick="router('team')" id="nav-team" data-roles="admin,kepala,koordinator,tim"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-users w-5 text-sm"></i> Direktori Tim
                </button>
                <button onclick="router('settings')" id="nav-settings" data-roles="admin"
                    class="sidebar-link w-full flex items-center gap-3 px-4 py-2.5 text-xs font-bold uppercase tracking-wider rounded-xl text-slate-500 transition-all">
                    <i class="fa-solid fa-gears w-5 text-sm"></i> Master & Backup
                </button>
            </nav>

            <div class="p-4 border-t border-slate-100 dark:border-slate-700">
                <div
                    class="bg-slate-50/80 dark:bg-slate-900/60 rounded-2xl p-4 border border-slate-100 dark:border-slate-700">
                    <p class="text-[9px] uppercase font-extrabold text-indigo-650 dark:text-indigo-400 tracking-widest">
                        Sinkronisasi</p>
                    <div
                        class="flex items-center justify-between text-[10px] text-slate-500 dark:text-slate-400 mt-2 font-medium">
                        <span><i class="fa-regular fa-clock mr-1"></i> Terakhir:</span>
                        <span id="last-sync-date" class="font-bold text-slate-700 dark:text-slate-200">-</span>
                    </div>
                    <button onclick="syncData()"
                        class="mt-3.5 w-full bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 text-slate-700 dark:text-white text-[10px] font-bold uppercase tracking-wider py-2 rounded-xl shadow-xs transition-all flex justify-center items-center gap-2">
                        <i class="fa-solid fa-rotate"></i> Sinkron
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main
            class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-900 relative transition-colors duration-300">
            <!-- Global Header for Search, Dark Mode, Notification -->
            <header
                class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-3.5 flex justify-between items-center shadow-xs shrink-0 z-20 transition-colors duration-300">
                <div class="flex items-center gap-4">
                    <button onclick="openMobileSidebar()"
                        class="md:hidden w-8 h-8 rounded-xl flex items-center justify-center text-slate-550 hover:bg-slate-50 dark:hover:bg-slate-700 dark:text-slate-300 transition-all">
                        <i class="fa-solid fa-bars text-lg"></i>
                    </button>
                    <div>
                        <h2
                            class="text-xs font-black text-slate-800 dark:text-slate-200 uppercase tracking-wider flex items-center gap-2">
                            <i class="fa-solid fa-shield-halved text-indigo-500 hidden md:inline"></i>
                            SIM Humas & Protokol BPS Kalbar
                        </h2>
                    </div>
                </div>

                <!-- Global Search -->
                <div class="flex-1 max-w-[200px] sm:max-w-xs md:max-w-md mx-4">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fa-solid fa-magnifying-glass text-[10px]"></i>
                        </span>
                        <input type="text" id="global-search-input" oninput="handleGlobalSearch(this.value)"
                            class="w-full pl-8.5 pr-4 py-1.5 bg-slate-50 dark:bg-slate-700/80 border border-slate-200 dark:border-slate-600 rounded-xl text-xs font-medium focus:bg-white dark:focus:bg-slate-800 focus:outline-none placeholder-slate-450 dark:text-white transition-all"
                            placeholder="Cari global di halaman aktif...">
                    </div>
                </div>

                <!-- Top Right Utilities -->
                <div class="flex items-center gap-2">
                    <!-- Dark Mode Toggle -->
                    <button onclick="toggleDarkMode()"
                        class="w-8 h-8 rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                        title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-moon dark:hidden text-xs"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-amber-500 text-xs"></i>
                    </button>

                    <!-- Notifications Dropdown -->
                    <div class="relative">
                        <button onclick="toggleNotificationPanel()"
                            class="w-8 h-8 rounded-lg border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-350 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all relative"
                            title="Notifikasi System">
                            <i class="fa-solid fa-bell text-xs"></i>
                            <span id="notif-badge"
                                class="absolute -top-1.5 -right-1.5 bg-rose-500 text-white font-extrabold text-[8px] px-1 rounded-full border-2 border-white dark:border-slate-850 hidden">0</span>
                        </button>

                        <!-- Panel Dropdown -->
                        <div id="notif-panel"
                            class="absolute right-0 mt-3.5 w-76 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-xl hidden z-50 overflow-hidden">
                            <div
                                class="p-3.5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/30">
                                <h4
                                    class="font-bold text-slate-800 dark:text-slate-200 text-xs uppercase tracking-wider flex items-center gap-1.5">
                                    <i class="fa-solid fa-bell text-indigo-500"></i> Notifikasi</h4>
                                <button onclick="markAllNotificationsRead()"
                                    class="text-[9px] font-black text-indigo-650 dark:text-indigo-400 hover:underline">Tandai
                                    dibaca</button>
                            </div>
                            <div id="notif-list"
                                class="max-h-64 overflow-y-auto p-2 space-y-1.5 bg-white dark:bg-slate-800">
                                <!-- Populated dynamically -->
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Render Area -->
            <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8 fade-in">
                <div class="flex flex-col justify-center items-center h-full">
                    <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-4">
                    </div>
                    <span class="text-xs text-slate-500 font-semibold uppercase tracking-wider">Menghubungkan ke server
                        database...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Script Bundles -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
